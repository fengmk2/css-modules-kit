packages:
  - 'packages/*'
  - 'crates/*'
allowBuilds:
  '@vscode/vsce-sign': true
  esbuild: true
  keytar: false
blockExoticSubdeps: true
minimumReleaseAge: 4320
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.1.21-alpha.7
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.21-alpha.7
  vite-plus: 0.1.21-alpha.7
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
minimumReleaseAgeExclude:
  - vite-plus
  - '@voidzero-dev/*'
